name: GCP deploy

on:
  push:
    branches: [main]

env:
  REGION: europe-west1
  SERVICE: toxic-scanner
  IMAGE: europe-west1-docker.pkg.dev/toxic-scanner-501911/toxic-scanner/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    # id-token: write — разрешаем job'у запрашивать у GitHub OIDC-токен;
    # без этого WIF-обмен невозможен в принципе.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Обмен OIDC-токена GitHub на короткоживущие креды сервис-аккаунта.
      # Хранимых секретов нет: доверие настроено на стороне GCP
      # (workload identity pool + условие "токен именно из этого репо").
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/521361829312/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-actions-deployer@toxic-scanner-501911.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build
        run: docker build -t "$IMAGE:$GITHUB_SHA" .

      - name: Push
        run: docker push "$IMAGE:$GITHUB_SHA"

      # Только образ и регион: новая ревизия наследует env vars и привязки
      # Secret Manager от текущей конфигурации сервиса.
      - name: Deploy
        run: gcloud run deploy "$SERVICE" --image "$IMAGE:$GITHUB_SHA" --region "$REGION" --quiet
